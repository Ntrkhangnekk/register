<!DOCTYPE html>
<html>
<head><title>Đăng ký tài khoản Minecraft</title></head>
<body>
  <h2>Đăng ký Minecraft</h2>
  <form action="/register" method="POST">
    <input name="username" placeholder="Tên Minecraft" required><br>
    <input name="password" type="password" placeholder="Mật khẩu" required><br>
    <button type="submit">Đăng ký</button>
  </form>
</body>
</html>
