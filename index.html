<!-- public/index.html -->
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Đăng ký Minecraft</title>
  <style>
    body {
      background: #1e1e1e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .form-box {
      background: #2a2a2a;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 10px #000;
      width: 320px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #00ff99;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      background: #1e1e1e;
      border: 1px solid #444;
      border-radius: 6px;
      color: #fff;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #00cc77;
      border: none;
      border-radius: 6px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s ease;
    }
    button:hover {
      background: #00ff99;
    }
    .msg {
      text-align: center;
      margin-top: 15px;
    }
  </style>
</head>
<body>
  <div class="form-box">
    <h2>Đăng ký Minecraft</h2>
    <form action="/register" method="POST">
      <input name="username" placeholder="Tên Minecraft" required />
      <input name="password" type="password" placeholder="Mật khẩu" required />
      <button type="submit">Đăng ký</button>
    </form>
    <div class="msg">
      <p>Sau khi đăng ký xong, vào server gõ <b>/login</b></p>
    </div>
  </div>
</body>
</html>
